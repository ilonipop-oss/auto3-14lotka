proxy-providers:
  reality_ru:
    type: http
    url: "https://ilonipop-oss.github.io/auto3-14lotka/reality-mobile.txt"
    interval: 1800  # 30мин синхронизация
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204

proxy-groups:
  - name: "STABLE-150ms"
    type: url-test
    tolerance: 150
    interval: 600
    use: [reality_ru]  # Только Игорёк!

  - name: "MOBILE"
    type: select
    proxies:
      - "STABLE-150ms"  # Только рабочий Игорёк!
      # ❌ DIRECT МЁРТВ!

rules:
  - DOMAIN-SUFFIX,yandex.ru,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - MATCH,MOBILE
