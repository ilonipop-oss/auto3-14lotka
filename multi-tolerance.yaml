proxy-providers:
  reality_top7:
    type: http
    url: "https://ilonipop-oss.github.io/auto3-14lotka/reality-mobile.txt"
    interval: 1800
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: "EU-TOP7-222ms"
    type: url-test
    tolerance: 222
    interval: 600
    use: [reality_top7]

  - name: "MOBILE"
    type: select
    proxies:
      - "EU-TOP7-222ms"

rules:
  # ✅ РОССИЙСКИЕ СЕРВИСЫ → ДИРЕКТ (скорость!)
  - DOMAIN-SUFFIX,yandex.ru,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - DOMAIN-SUFFIX,mail.ru,DIRECT
  
  # ✅ ВСЁ ОСТАЛЬНОЕ → ПРОКСИ
  - MATCH,MOBILE
