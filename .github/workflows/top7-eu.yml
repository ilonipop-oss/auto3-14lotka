name: TOP-7 EU Allowlist
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  top7:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: TOP-7 EU filter
      run: |
        curl -sL https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt > igor-all.txt
        
        # рџ”Ґ РўРћРџ-7: NL+DE+FI+HU+ES+SE
        grep -E "(рџ‡ірџ‡±|Netherlands|рџ‡©рџ‡Є|Germany|рџ‡«рџ‡®|Finland|рџ‡­рџ‡є|Hungary|рџ‡Єрџ‡ё|Spain|рџ‡ёрџ‡Є|Sweden)" igor-all.txt > reality-mobile.txt
        
        NEW=$(wc -l < reality-mobile.txt)
        echo "TOP-7 EU: $NEW РЅРѕРґ"
        
        if [ $NEW -gt 100 ]; then
          git config user.name "TOP7-EU-Bot"
          git config user.email "bot@github.com"
          git add reality-mobile.txt
          git commit -m "рџ‡ірџ‡±рџ‡©рџ‡Єрџ‡«рџ‡® TOP-7: $NEW РЅРѕРґ" || exit 0
