name: TOP-7 EU Classic
on: [workflow_dispatch]
jobs:
  top7:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: |
        grep -vE "(🇷🇺|🇦🇲|rostelecom|mts|beeline|МТС|Билайн|vkcloud|selectel|\.ru$)" reality-mobile.txt | head -7 > eu-top7.txt
        echo "TOP-7 EU: $(wc -l < eu-top7.txt)"
        cat eu-top7.txt
    - uses: actions/upload-artifact@v4
      with:
        name: eu-top7-classic
        path: eu-top7.txt
