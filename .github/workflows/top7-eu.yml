name: TOP-7 EU Allowlist 30min
on:
  permissions:
    contents: write
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  top7:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: EU-TOP7 Filter
      run: |
        curl -sL https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt > igor-all.txt
        grep -vE "(🇷🇺|🇦🇲|Russia|Armenia|51\.250\.|95\.163\.|178\.154\.|146\.185\.|rostelecom|mts|beeline|МТС|Билайн|kz|lt|lv|ee|by|uz|kg|tm|az|mos|msk|spb|\.ru$|vkcloud|selectel)" igor-all.txt > eu-top7.txt
        NEW_LINES=$(wc -l < eu-top7.txt)
        OLD_LINES=$(wc -l < eu-top7.txt.old 2>/dev/null || echo 0)
        echo "Igor: $(wc -l < igor-all.txt), EU-TOP7: $NEW_LINES"
        if [ "$NEW_LINES" -gt 10 ]; then
          mv eu-top7.txt eu-top7.txt.old
          git config user.name "EU-TOP7"
          git config user.email "bot@github.com"
          git add eu-top7.txt
          git commit -m "🇳🇱🇩🇪🇫🇮 EU-TOP7: $NEW_LINES nodes"
          git push
        fi
