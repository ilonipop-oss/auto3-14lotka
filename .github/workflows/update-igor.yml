name: Igorёk WHITE-CIDR (No RU/AM) 30min
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Filter Igorёk (No RU/AM)
      run: |
        curl -sL https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt > igor-all.txt
        grep -vE "(🇷🇺|🇦🇲|Russia|Armenia|rostelecom|mts|beeline|МТС|Билайн)" igor-all.txt > filtered-igor.txt
        NEW_LINES=$(wc -l < filtered-igor.txt)
        OLD_LINES=$(wc -l < reality-mobile.txt 2>/dev/null || echo 0)
        echo "Всего: $(wc -l < igor-all.txt), фильтр: $NEW_LINES"
        
        if [ "$NEW_LINES" -gt "$OLD_LINES" ]; then
          mv filtered-igor.txt reality-mobile.txt
          git config user.name "auto3-bot"
          git config user.email "bot@github.com"
          git add reality-mobile.txt
          git commit -m "🔄 Igorёk 30min: +$((NEW_LINES-OLD_LINES)) (no RU/AM)"
          git push
        else
          rm filtered-igor.txt igor-all.txt
        fi
