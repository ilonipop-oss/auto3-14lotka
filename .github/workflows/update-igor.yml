name: IgorС‘k BLACKLIST (no RU/AM)
on:
  schedule:
    - cron: '*/30 * * * *'  # 30РјРёРҪ
  workflow_dispatch:

jobs:
  blacklist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Blacklist RU/AM
      run: |
        curl -sL https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt > igor-all.txt
        
        # рҹ–Ө РҡРҳРҡ: СӮРҫР»СҢРәРҫ RU/AM
        grep -vE "(рҹҮ·рҹҮә|Russia|рҹҮҰрҹҮІ|Armenia|rostelecom|mts|beeline|РңРўРЎ|Р‘РёР»Р°Р№РҪ)" igor-all.txt > reality-mobile.txt
        
        NEW=$(wc -l < reality-mobile.txt)
        OLD=$(wc -l < reality-mobile.txt 2>/dev/null || echo 0)
        echo "Blacklist: $NEW РҪРҫРҙ (РёР· $(wc -l < igor-all.txt))"
        
        if [ $NEW -gt $OLD ] || [ $NEW -gt 300 ]; then
          git config user.name "Blacklist-Bot"
          git config user.email "bot@github.com"
          git add reality-mobile.txt
          git commit -m "рҹ–Ө Blacklist: $NEW РҪРҫРҙ (no RU/AM)" || exit 0
          git push
        fi
