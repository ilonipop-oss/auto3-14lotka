name: Igorёk WHITE-CIDR (No RU)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Filter Igorёk (exclude RU CIDR)
      run: |
        # Скачиваем свежий список от Игорёка
        curl -sL https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt > igor-all.txt
        
        # Фильтруем НЕ российские CIDR (исключаем .ru ASN + известные РФ диапазоны)
        grep -vE "(185|77|31|87|109|176|178|188|194|195|213|217)" igor-all.txt | \
        grep -vE "(ru|russia|telecom|rostelecom|mts|beeline|megafon)" > filtered-igor.txt
        
        NEW_LINES=$(wc -l < filtered-igor.txt)
        OLD_LINES=$(wc -l < reality-mobile.txt 2>/dev/null || echo 0)
        
        echo "Полный список: $(wc -l < igor-all.txt) строк"
        echo "После фильтра (no RU): $NEW_LINES строк"
        
        if [ "$NEW_LINES" -gt "$OLD_LINES" ]; then
          mv filtered-igor.txt reality-mobile.txt
          git config user.name "auto3-bot"
          git config user.email "bot@github.com"
          git add reality-mobile.txt
          git commit -m "🔄 Igorёk filtered: +$((NEW_LINES-OLD_LINES)) строк (no RU)"
          git push
          echo "✅ Anti-RF фильтр сработал!"
        else
          rm filtered-igor.txt igor-all.txt
          echo "ℹ️ Новых рабочих CIDR нет"
        fi
